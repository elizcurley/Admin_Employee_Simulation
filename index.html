<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Personnel Case Wheel</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
  </style>
</head>
<body class="bg-gray-100">
  <div id="root" class="p-6"></div>
  <script type="text/javascript">
    const scenarios = [
      {
        role: "Child Welfare Supervisor",
        issue: "repeated tardiness and absences",
        context: "in a high-caseload child-welfare department",
        background: "Timecard records indicate 12 days of arriving 15+ minutes late and 3 unexcused absences last month without prior notice."
      },
      {
        role: "Intake Coordinator",
        issue: "unreturned client inquiries",
        context: "in a high-volume intake unit",
        background: "Call logs show 20% of intake calls went unanswered for more than 48 hours, and three complaints were filed by clients."
      },
      {
        role: "Compliance Supervisor",
        issue: "documentation errors in audit",
        context: "during a nonprofit management review",
        background: "Audit flagged five documentation errors in a random sample of case files last month."
      },
      {
        role: "School Social Worker",
        issue: "complaining about clients and venting online on personal social media",
        context: "in an urban school district",
        background: "Over the past month, the employee posted several tweets and Facebook updates complaining about students and their families, prompting concern from administration about professionalism and confidentiality."
      },
      {
        role: "Field Training Supervisor",
        issue: "lack of mentorship for new hires",
        context: "in a multi-disciplinary clinic",
        background: "New-hire surveys indicate no assigned mentor and irregular check-ins led to confusion and lower confidence among staff."
      }
    ];

    const personas = [
      { experience: "mid-career", attitude: "dedicated but overwhelmed", name: "Alex Rivera", backstory: "juggling a high caseload while dealing with personal burnout" },
      { experience: "experienced", attitude: "defensive and frustrated", name: "Jordan Kim", backstory: "feeling undervalued after years of service" },
      { experience: "newer", attitude: "proactive but inconsistent", name: "Taylor Nguyen", backstory: "eager to learn but struggling with time management" },
      { experience: "mid-career", attitude: "dedicated but overwhelmed", name: "Priya Shah", backstory: "balancing work with family responsibilities leading to occasional lapses" },
      { experience: "experienced", attitude: "defensive and frustrated", name: "Marcus Lee", backstory: "frustrated with recent policy changes affecting workflow" }
    ];

    function Wheel() {
      const [selectedScenario, setSelectedScenario] = React.useState(null);
      const [selectedPersona, setSelectedPersona] = React.useState(null);
      const [isSpinning, setIsSpinning] = React.useState(false);
      const [copied, setCopied] = React.useState(false);
      const [useDropdown, setUseDropdown] = React.useState(false);
      const [selectedIndex, setSelectedIndex] = React.useState(-1);
      const textAreaRef = React.useRef(null);

      const spinWheel = () => {
        setIsSpinning(true);
        setTimeout(() => {
          const randomIndex = Math.floor(Math.random() * scenarios.length);
          const randomPersonaIndex = Math.floor(Math.random() * personas.length);
          setSelectedScenario(scenarios[randomIndex]);
          setSelectedPersona(personas[randomPersonaIndex]);
          setIsSpinning(false);
        }, 2000);
      };

      const handleDropdownChange = (event) => {
        const index = parseInt(event.target.value);
        setSelectedIndex(index);
        if (index >= 0) {
          const randomPersonaIndex = Math.floor(Math.random() * personas.length);
          setSelectedScenario(scenarios[index]);
          setSelectedPersona(personas[randomPersonaIndex]);
        } else {
          setSelectedScenario(null);
          setSelectedPersona(null);
        }
      };

      const getPrompt = () => {
        if (!selectedScenario || !selectedPersona) return '';
        return `You are role-playing as an employee in a social services organization. Your persona: You are a ${selectedPersona.experience} ${selectedPersona.attitude} social worker named ${selectedPersona.name}. You have ${selectedPersona.backstory}. Respond in a realistic, conversational tone—use natural language, express emotions appropriately (e.g., initial defensiveness, then openness with good listening), and avoid being overly agreeable right away. Before each response, think step-by-step internally (but don't show it): 1) Consider the root cause of the issue. 2) Reflect on how it impacts professional growth, team/agency, and clients. 3) Tie in relevant NASW Code of Ethics standards (e.g., confidentiality, competence). 4) Adapt based on the supervisor's active listening and problem-solving.

We are simulating a realistic employee-supervisor meeting. The user is the supervisor (${selectedScenario.role}) in (${selectedScenario.context}). You are the employee, discussing (${selectedScenario.issue}).

**FIRST, BEFORE ANY CONVERSATION STARTS:** Provide concise background data relevant to the discussion, such as: "${selectedScenario.background}". Present it neutrally as a list or summary of logs/records (e.g., "Here’s the relevant data from timecard records: ..."). Do NOT incorporate this into dialogue or assume the supervisor's lines—output it standalone.

**THEN, WAIT FOR THE SUPERVISOR TO LEAD THE CONVERSATION.** Once the user (supervisor) responds, begin the role-play as the employee. Keep your responses short (2-4 sentences max per turn) and conversational—ask clarifying questions, share perspectives, and build toward understanding. Allow the supervisor to lead, but introduce realistic challenges like defensiveness or external factors (e.g., staffing shortages).

The simulation ends when you (the employee) agree to a specific action plan (including follow-up steps) or sign a document. Note the completion clearly, e.g., "I agree to this plan. Employee Signature: [Name], Date: [Current Date]."

Goals: Help the supervisor practice problem-solving, active listening, evidence analysis, ethical discussions, and collaborative decision-making in a social services context. Ensure the conversation covers: purpose/evidence, perspectives, impacts (on growth/team/clients), overcoming
